# ── WebSocket upgrade map (must be at http block level) ──────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# ── Rate limiting zones ───────────────────────────────────────────────────────
# Limit API requests to 30 per minute per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
# Limit auth attempts to 5 per minute per IP
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# ── Upstream definitions ──────────────────────────────────────────────────────
upstream backend {
    server 127.0.0.1:4096;
    keepalive 32;
}

upstream frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Required for Certbot Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    # ── SSL (managed by Certbot — do not edit these lines manually) ───────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header X-XSS-Protection           "1; mode=block"                       always;

    # ── General settings ──────────────────────────────────────────────────────
    client_max_body_size 50m;
    server_tokens        off;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript
                      image/svg+xml;

    # ── Backend API routes ────────────────────────────────────────────────────
    # All known backend prefixes are proxied to the Hono server.
    # Rate-limited to prevent abuse.

    location ~ ^/(global|auth|doc|log|session|file|provider|permission|config|mcp|workspace|question|pty|tui|experimental|wiki) {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;

        # Required for WebSocket upgrade (used by session streaming, event SSE)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeouts for streaming responses (SSE, long AI completions)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;

        # Disable buffering for SSE / streaming endpoints
        proxy_buffering    off;
        proxy_cache        off;
    }

    # Stricter rate limit on auth endpoint
    location /auth {
        limit_req zone=auth burst=3 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend (SPA) ────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cache static assets (hashed filenames) for 1 year
        location ~* \.(js|css|woff|woff2|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
            proxy_pass       http://frontend;
            proxy_cache_valid 200 1y;
            add_header        Cache-Control "public, immutable";
        }
    }
}

