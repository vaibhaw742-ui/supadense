services:

  # ── Backend: no port exposed to host — only reachable via nginx ────────────
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend.prod
    # NO ports — backend is internal only
    volumes:
      # Bind mounts so all data lives at a predictable path on the droplet
      # Easy to snapshot, rsync, inspect, or restore from /root/data/
      - /root/data/opencode:/root/.local/share/opencode
      - /root/data/opencode-config:/root/.config/opencode
      - /root/data/workspaces:/workspaces
    env_file:
      - .env.prod
    restart: unless-stopped

  # ── Frontend: static build served by nginx ─────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend.prod
    # NO ports — served through nginx
    restart: unless-stopped
    depends_on:
      - backend

  # ── nginx: only public-facing service ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ── Certbot: renews SSL certs automatically ────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    # Renew every 12 hours; certbot skips if cert is still valid
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    restart: unless-stopped

# No named volumes — all data uses bind mounts at /root/data/ on the droplet
