services:

  # ── Backend: OpenCode headless server ──────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.prod.backend
    # Only accessible to Nginx on the host — not exposed to the internet
    ports:
      - "127.0.0.1:4096:4096"
    volumes:
      # Persist DB across container restarts/rebuilds
      - opencode-data:/root/.local/share/opencode
      # Persist global opencode config
      - opencode-config:/root/.config/opencode
      # Workspaces folder on the droplet (KB files, etc.)
      - ${WORKSPACES_PATH:-/home/deploy/workspaces}:/workspaces/Desktop
    env_file:
      - .env.prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend: Nginx serving built static files ────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.prod.frontend
      args:
        # These are baked into the static bundle at build time.
        # Browser connects to the host's public domain — Nginx proxies /api and /wiki to backend.
        VITE_OPENCODE_SERVER_HOST: ${PUBLIC_DOMAIN}
        VITE_OPENCODE_SERVER_PORT: "443"
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  opencode-data:
  opencode-config:
