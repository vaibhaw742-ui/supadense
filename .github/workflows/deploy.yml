name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /root/supadense
            git pull origin main
            cd deployment
            docker-compose-v2 -f docker-compose.prod.yml build backend
            docker-compose-v2 -f docker-compose.prod.yml build frontend
            docker-compose-v2 -f docker-compose.prod.yml rm -f backend frontend
            docker-compose-v2 -f docker-compose.prod.yml up -d
            echo "Deploy complete"
